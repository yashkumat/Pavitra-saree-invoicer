    <!-- Container -->
    <div class="container">
      <!-- Main Body -->
      <main>
        <!-- Hero Section -->

          <p class="lead" id="productDescription">
            🚀 Instant Invoice 🌐 Anywhere, Anytime
          </p>
          <hr />
        </section>

        <!-- Customer Bill Section -->
        <section id="billSection">
          <div class="row">
            <div class="col-md-12">
              <h4
                class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-primary">Customer Bill</span>
                <span class="badge bg-primary rounded-pill" id="totalItemsCount"
                  >0</span
                >
              </h4>
            </div>
            <div class="col-md-12">
              <ul class="list-group mb-3" id="productList">
                <li
                  class="list-group-item d-flex justify-content-between lh-sm"
                  onclick="goToAddItem()">
                  <h6 class="my-0">No items in the bill. Add Items!</h6>
                </li>
              </ul>
            </div>
          </div>
        </section>

        <!-- Add Product Form -->
        <section id="addItemSection">
          <form class="product" id="product">
            <div class="row g-1" id="addItemForm">
              <hr />
              <div class="col-md-12 text-end">
                <h5>Add Item</h5>
              </div>
              <div class="col-md-6">
                <input
                  name="productName"
                  type="text"
                  class="form-control"
                  id="productName"
                  placeholder="Name" />
              </div>

              <div class="col-md-3">
                <input
                  type="text"
                  class="form-control"
                  id="productPrice"
                  placeholder="Price"
                  onkeypress="return event.charCode == 46 || (event.charCode >= 48 && event.charCode <= 57)"
                  name="productPrice" />
              </div>
              <div class="col-md-3">
                <input
                  type="text"
                  class="form-control"
                  id="productQuantity"
                  onkeypress="return event.charCode == 46 || (event.charCode >= 48 && event.charCode <= 57)"
                  placeholder="Quantity" />
              </div>

              <div class="col-md-12 text-center mt-3" id="actionPanel">
                <button
                  class="btn btn-success btn-sm"
                  type="button"
                  id="addItemToBillButton"
                  onclick="addItemToBill()">
                  <span>Add <i class="bi bi-file-earmark-plus"></i></span>
                </button>
                <button
                  class="btn btn-danger btn-sm d-none"
                  type="button"
                  id="deletebutton"
                  onclick="deleteItem()">
                  Delete <i class="bi bi-trash"></i>
                </button>
                <button
                  class="btn btn-primary btn-sm d-none"
                  type="button"
                  id="addCustomer"
                  onclick="openCustomerForm()">
                  Next <i class="bi bi-arrow-bar-right"></i>
                </button>
              </div>
            </div>
          </form>
          <hr />
        </section>

        <!-- Add Customer Form -->
        <section id="addCustomerSection" class="d-none">
          <hr class="my-3" />
          <div class="row">
            <div class="col-md-12 text-end">
              <h5>Customer Details</h5>
            </div>
            <div class="col-md-12">
              <form>
                <div class="row g-1">
                  <div class="col-md-6">
                    <input
                      type="text"
                      class="form-control"
                      id="customerName"
                      placeholder="Name" />
                  </div>
                  <div class="col-md-6">
                    <input
                      type="text"
                      class="form-control"
                      id="customerNumber"
                      placeholder="Number"
                      maxlength="10"
                      onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" />
                  </div>
                  <div class="col-md-6">
                    <input
                      type="text"
                      class="form-control"
                      id="customerAddress"
                      placeholder="Address" />
                  </div>
                  <div class="col-md-6">
                    <input
                      type="text"
                      class="form-control"
                      id="customerGST"
                      placeholder="GST"
                      maxlength="15"
                      style="text-transform: uppercase" />

                  <div class="col-md-12 text-center">
                    <button
                      class="btn btn-danger mt-3 btn-sm"
                      type="button"
                      id="backToAddItemBtn"

                    </button>

                      class="btn btn-success mt-3 btn-sm"
                      type="button"
                      id="generateInvoiceBtn"
                      onclick="generateInvoice()">
                      Generate Invoice <i class="bi bi-receipt-cutoff"></i>
                    </button>
                    <hr />
                  </div>
                </div>
              </form>
            </div>
          </div>

        <!-- Invoice Preview & Download -->
        <section id="invoiceSection" class="d-none">
          <hr />
          <div class="row">
            <div class="col-md-12">
              <h4 class="mb-3 text-end">Invoice Preview</h4>
              <div id="pdfPreview" class="bg-light">
                <!-- Invoice preview will be displayed here -->
              </div>
            </div>
            <div class="col-md-12 text-center mt-3">
              <button
                class="btn btn-danger btn-sm"
                type="button"
                onclick="backToAddCustomer()">
                <i class="bi bi-arrow-bar-left"></i> Back
              </button>
              <button
                class="btn btn-primary btn-sm"
                type="button"
                onclick="downloadInvoice()">
                Download Invoice <i class="bi bi-filetype-pdf"></i>
              </button>
              <button
                class="btn btn-success btn-sm"
                type="button"
                onclick="newBill()">
                New Bill <i class="bi bi-file-earmark-plus-fill"></i>
              </button>
              <hr />
            </div>
          </div>

      </main>

      <!-- Footer -->
      <footer class="my-5 text-body-secondary text-center text-small">
        <p class="mb-1">Product by <a href="https://www.yashk.in">yashk.in</a>, 2023</p>
      </footer>

    <script>
      let cart = [];
      let customer = {};

      function goToAddItem() {
        document.getElementById("addItemSection").scrollIntoView();
      }

      function backToAddItem() {
        let customerForm = document.getElementById("addCustomerSection");
        customerForm.classList.add("d-none");

        let itemsForm = document.getElementById("addItemSection");
        itemsForm.classList.remove("d-none");
      }

      function backToAddCustomer() {
        let customerForm = document.getElementById("addCustomerSection");
        customerForm.classList.remove("d-none");
        let invoiceSection = document.getElementById("invoiceSection");
        invoiceSection.classList.add("d-none");
      }

      function newBill() {
        location.reload();
      }

      // Add item to bill
      function addItemToBill() {
        let validated = false;
        var element = {};
        element.description = document.getElementById("productName").value;
        element.price = parseFloat(document.getElementById("productPrice").value) || 0;
        element.quantity = parseFloat(document.getElementById("productQuantity").value) || 0;

        if (element.description && element.price > 0 && element.quantity > 0) {
          cart.push(element);
          buildCart();
          document
            .getElementById("productName")
            .classList.remove("border-danger");
          document
            .getElementById("productPrice")
            .classList.remove("border-danger");
          document
            .getElementById("productQuantity")
            .classList.remove("border-danger");
          document.getElementById("product").reset();
        } else {
          if (element.description == "") {
            document
              .getElementById("productName")
              .classList.add("border-danger");
          } else {
            document
              .getElementById("productName")
              .classList.remove("border-danger");
          }
          if (element.price <= 0) {
            document
              .getElementById("productPrice")
              .classList.add("border-danger");
          } else {
            document
              .getElementById("productPrice")
              .classList.remove("border-danger");
          }
          if (element.quantity <= 0) {
            document
              .getElementById("productQuantity")
              .classList.add("border-danger");
          } else {
            document
              .getElementById("productQuantity")
              .classList.remove("border-danger");
          }
        }

        document.getElementById("billSection").scrollIntoView();
      }

      function openCustomerForm() {
        window.scrollTo(0, document.body.scrollHeight / 2);

        let customerForm = document.getElementById("addCustomerSection");
        customerForm.classList.remove("d-none");

        let itemsForm = document.getElementById("addItemSection");
        itemsForm.classList.add("d-none");
      }
      
      // build Cart
      function buildCart() {
        let itemsList = document.getElementById("productList");

        itemsList.innerHTML = "";

        if (cart.length == 0) {
          itemsList.innerHTML = `
                <li class="list-group-item d-flex justify-content-between lh-sm">
                    <h6 class="my-0">No items in the bill!</h6>
                </li>`;
          
          let nextButton = document.getElementById("addCustomer");
          nextButton.classList.add("d-none");
        } else {
          cart.forEach((item, key) => {
            var iDiv = document.createElement("li");
            iDiv.className =
              "list-group-item d-flex justify-content-between lh-sm";
            iDiv.innerHTML = `
                  <div onclick="editItem(${key})" style="cursor: pointer;">
                    <h6 class="my-0"><b>${key + 1}.</b> ${item.description}</h6>
                    <small class="text-body-secondary">Quantity: ${
                      item.quantity
                    } | Price: Rs. ${item.price.toFixed(2)}</small>
                  </div>
                  <span class="text-body-secondary">Rs. ${(item.quantity * item.price).toFixed(2)}</span>`;

            itemsList.appendChild(iDiv);
          });

          let total = cart
            .map((item) => item.price * item.quantity)
            .reduce((total, num) => total + num, 0);

          var iDiv = document.createElement("li");

          iDiv.className =
            "list-group-item d-flex justify-content-between my-1 bg-primary text-white";
          iDiv.innerHTML = `
                  <h5>Total:</h5>
                  <h5>Rs. ${total.toFixed(2)}</h5>
                  `;

          itemsList.appendChild(iDiv);

          let nextButton = document.getElementById("addCustomer");
          nextButton.classList.remove("d-none");
        }

        document.getElementById("totalItemsCount").innerHTML = cart.length;
      }

      // Show update form
      function editItem(id) {
        let item = cart[id];

        // change name and function of button
        document.getElementById(
          "addItemToBillButton"
        ).innerHTML = `Save <i class="bi bi-file-earmark-plus"></i>`;
        document.getElementById("addItemToBillButton").onclick = function () {
          updateItem(id);
        };

        // Previous values
        document.getElementById("productName").value = item.description;
        document.getElementById("productPrice").value = item.price;
        document.getElementById("productQuantity").value = item.quantity;

        // Show delete button
        let deleteButtonDiv = document.getElementById("deletebutton");
        deleteButtonDiv.classList.remove("d-none");
        deleteButtonDiv.onclick = function () {
          deleteItem(id);
        };

        document.getElementById(
          "addCustomer"
        ).innerHTML = `Cancel <i class="bi bi-x-lg"></i>`;
        document.getElementById("addCustomer").onclick = function () {
          cancelProcess();
        };
      }

      function cancelProcess() {
        // Change name and function of button
        document.getElementById("addItemToBillButton").onclick = function () {
          addItemToBill();
        };
        document.getElementById(
          "addItemToBillButton"
        ).innerHTML = `Add <i class="bi bi-file-earmark-plus"></i>`;

        // Hide delete button
        let deleteButtonDiv = document.getElementById("deletebutton");
        deleteButtonDiv.classList.add("d-none");

        document.getElementById(
          "addCustomer"
        ).innerHTML = `Next <i class="bi bi-arrow-bar-right"></i>`;
        document.getElementById("addCustomer").onclick = function () {
          openCustomerForm();
        };

        if (cart.length > 0) {
          document.getElementById(
            "addCustomer"
          ).innerHTML = `Next <i class="bi bi-arrow-bar-right"></i>`;
          document.getElementById("addCustomer").onclick = function () {
            openCustomerForm();
          };
        } else {
          document.getElementById("addCustomer").classList.add("d-none");
        }

        document.getElementById("product").reset();
      }

      // update item
      function updateItem(id) {
        let element = cart[id];
        element.description = document.getElementById("productName").value;
        element.price = parseFloat(document.getElementById("productPrice").value) || 0;
        element.quantity = parseFloat(document.getElementById("productQuantity").value) || 0;

        buildCart();

        // Change name and function of button
        document.getElementById("addItemToBillButton").onclick = function () {
          addItemToBill();
        };
        document.getElementById(
          "addItemToBillButton"
        ).innerHTML = `Add <i class="bi bi-file-earmark-plus"></i>`;

        // Hide delete button
        let deleteButtonDiv = document.getElementById("deletebutton");
        deleteButtonDiv.classList.add("d-none");

        document.getElementById(
          "addCustomer"
        ).innerHTML = `Next <i class="bi bi-arrow-bar-right"></i>`;
        document.getElementById("addCustomer").onclick = function () {
          openCustomerForm();
        };

        document.getElementById("product").reset();
      }

      // Delete item from list
      function deleteItem(id) {
        let value = cart[id];

        cart = cart.filter(function (item) {
          return item !== value;
        });

        buildCart();

        let deleteButtonDiv = document.getElementById("deletebutton");
        deleteButtonDiv.classList.add("d-none");

        document.getElementById("addItemToBillButton").innerHTML = "Add";
        document.getElementById("addItemToBillButton").onclick = function () {
          addItemToBill();
        };

        document.getElementById("product").reset();
        
        // If cart is empty after deletion, hide next button
        if (cart.length === 0) {
          document.getElementById("addCustomer").classList.add("d-none");
        }
      }

      // Get client details
      function getClient() {
        customer.name = document.getElementById("customerName").value || "Customer";
        customer.phone = document.getElementById("customerNumber").value || "N/A";
        customer.address = document.getElementById("customerAddress").value || "N/A";
        customer.gst = document.getElementById("customerGST").value || "N/A";
        return customer;
      }

      // Generate Invoice with jsPDF
      function generateInvoice() {
        let customerName = document.getElementById("customerName").value;
        if (customerName === "") {
          document
            .getElementById("customerName")
            .classList.add("border-danger");
          alert("Please enter customer name");
          return;
        } else {
          document
            .getElementById("customerName")
            .classList.remove("border-danger");

          // Get customer details
          getClient();

          // Hide customer section, show invoice section
          let invoiceSection = document.getElementById("invoiceSection");
          invoiceSection.classList.remove("d-none");

          let customerSection = document.getElementById("addCustomerSection");
          customerSection.classList.add("d-none");

          // Show preview
          showInvoicePreview();
        }
      }

      // Show invoice preview in HTML
      function showInvoicePreview() {
        let previewDiv = document.getElementById("pdfPreview");
        
        let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        let itemsHtml = '';
        cart.forEach((item, index) => {
          itemsHtml += `
            <tr>
              <td>${index + 1}</td>
              <td>${item.description}</td>
              <td>${item.quantity}</td>
              <td>Rs. ${item.price.toFixed(2)}</td>
              <td>Rs. ${(item.quantity * item.price).toFixed(2)}</td>
            </tr>
          `;
        });

        let previewHtml = `
          <div class="invoice-preview p-4">
            <div class="invoice-header text-center">
              <h2>PAVITRA SAREES</h2>
              <p>M. G. Road, Ghoti | GST: 27AOUPK8657H3ZI | Phone: 9226331577</p>
            </div>
            
            <div class="invoice-details row">
              <div class="col-6">
                <h5>Bill To:</h5>
                <p><strong>${customer.name}</strong><br>
                Phone: ${customer.phone}<br>
                Address: ${customer.address}<br>
                GST: ${customer.gst}</p>
              </div>
              <div class="col-6 text-end">
                <h5>Invoice Details:</h5>
                <p>Invoice No: ${getBillNumber()}<br>
                Date: ${getDate()}<br>
                Due Date: ${getDueDate()}</p>
              </div>
            </div>
            
            <table class="invoice-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Description</th>
                  <th>Qty</th>
                  <th>Unit Price</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody>
                ${itemsHtml}
              </tbody>
            </table>
            
            <div class="total-section">
              <p>Sub Total: Rs. ${total.toFixed(2)}</p>
              <p>GST (0%): Rs. 0.00</p>
              <h4>Grand Total: Rs. ${total.toFixed(2)}</h4>
            </div>
            
            <div class="text-center mt-4">
              <p>We appreciate your business and thank you for choosing Pavitra Sarees.</p>
            </div>
          </div>
        `;
        
        previewDiv.innerHTML = previewHtml;
      }

      // Download invoice as PDF
      function downloadInvoice() {
        if (cart.length === 0) {
          alert("No items in the cart!");
          return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        let yPos = 20;
        const pageWidth = doc.internal.pageSize.width;
        
        // Add Logo/Header
        doc.setFontSize(20);
        doc.setTextColor(40, 40, 40);
        doc.text("PAVITRA SAREES", pageWidth / 2, yPos, { align: "center" });
        
        yPos += 10;
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text("M. G. Road, Ghoti | GST: 27AOUPK8657H3ZI | Phone: 9226331577", pageWidth / 2, yPos, { align: "center" });
        
        yPos += 15;
        
        // Customer Details
        doc.setFontSize(12);
        doc.setTextColor(0, 0, 0);
        doc.text("Bill To:", 20, yPos);
        doc.setFontSize(10);
        doc.text(`Name: ${customer.name}`, 20, yPos + 7);
        doc.text(`Phone: ${customer.phone}`, 20, yPos + 14);
        doc.text(`Address: ${customer.address}`, 20, yPos + 21);
        doc.text(`GST: ${customer.gst}`, 20, yPos + 28);
        
        // Invoice Details
        doc.setFontSize(12);
        doc.text("Invoice Details:", pageWidth - 60, yPos);
        doc.setFontSize(10);
        doc.text(`Invoice No: ${getBillNumber()}`, pageWidth - 60, yPos + 7);
        doc.text(`Date: ${getDate()}`, pageWidth - 60, yPos + 14);
        doc.text(`Due Date: ${getDueDate()}`, pageWidth - 60, yPos + 21);
        
        yPos += 40;
        
        // Items Table
        const tableColumn = ["#", "Description", "Qty", "Unit Price", "Amount"];
        const tableRows = [];
        
        cart.forEach((item, index) => {
          const row = [
            index + 1,
            item.description,
            item.quantity.toString(),
            `Rs. ${item.price.toFixed(2)}`,
            `Rs. ${(item.quantity * item.price).toFixed(2)}`
          ];
          tableRows.push(row);
        });
        
        doc.autoTable({
          startY: yPos,
          head: [tableColumn],
          body: tableRows,
          theme: 'grid',
          styles: { fontSize: 9 },
          headStyles: { fillColor: [0, 123, 255] },
        });
        
        // Calculate total
        let total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        yPos = doc.lastAutoTable.finalY + 10;
        
        // Totals
        doc.setFontSize(10);
        doc.text(`Sub Total: Rs. ${total.toFixed(2)}`, pageWidth - 60, yPos);
        doc.text(`GST (0%): Rs. 0.00`, pageWidth - 60, yPos + 7);
        doc.setFontSize(12);
        doc.text(`Grand Total: Rs. ${total.toFixed(2)}`, pageWidth - 60, yPos + 14);
        
        // Footer
        yPos = doc.internal.pageSize.height - 20;
        doc.setFontSize(9);
        doc.setTextColor(100, 100, 100);
        doc.text("We appreciate your business and thank you for choosing Pavitra Sarees.", pageWidth / 2, yPos, { align: "center" });
        
        // Save PDF
        let fileName = `Pavitra_Sarees_${customer.name}_${getDate()}.pdf`;
        doc.save(fileName);
      }

      // Helper functions
      function getDate() {
        var today = new Date();
        var dd = String(today.getDate()).padStart(2, "0");
        var mm = String(today.getMonth() + 1).padStart(2, "0");
        var yyyy = today.getFullYear();
        return dd + "-" + mm + "-" + yyyy;
      }

      function getDueDate() {
        var dueDate = new Date(new Date().getTime() + 15 * 24 * 60 * 60 * 1000);
        var dd = String(dueDate.getDate()).padStart(2, "0");
        var mm = String(dueDate.getMonth() + 1).padStart(2, "0");
        var yyyy = dueDate.getFullYear();
        return dd + "-" + mm + "-" + yyyy;
      }

      function getBillNumber() {
        var today = new Date();
        let hour = today.getHours();
        let minutes = today.getMinutes();
        let seconds = today.getSeconds();
        return `INV-${hour}${minutes}${seconds}`;
      }
    </script>
    <script src="bootstrap.bundle.min.js"></script>
  </body>
</html>
